<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 Музыкальный чарт - Топ песен</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 18px;
            opacity: 0.9;
        }

        /* Форма добавления */
        .add-song-form {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .form-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        /* Чарт */
        .chart-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .chart-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
            border-left: 5px solid #667eea;
            padding-left: 15px;
        }

        .chart-table {
            width: 100%;
            border-collapse: collapse;
        }

        .chart-table th {
            background: #f5f5f5;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #555;
        }

        .chart-table td {
            padding: 12px 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        .chart-table tr:hover {
            background: #f9f9f9;
        }

        .position-1 {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            color: white;
            font-weight: bold;
        }

        .position-2 {
            background: linear-gradient(135deg, #C0C0C0 0%, #A9A9A9 100%);
            color: white;
            font-weight: bold;
        }

        .position-3 {
            background: linear-gradient(135deg, #CD7F32 0%, #B87333 100%);
            color: white;
            font-weight: bold;
        }

        .position-number {
            font-weight: bold;
            font-size: 18px;
        }

        .points {
            color: #667eea;
            font-weight: bold;
        }

        /* Статистика */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .stat-card h3 {
            color: #666;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }

        /* График */
        .graph-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .graph-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }

        .bar {
            margin-bottom: 15px;
        }

        .bar-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .bar-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 30px;
            border-radius: 8px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            padding-left: 10px;
            color: white;
            font-size: 12px;
        }

        .delete-btn {
            background: #ff4444;
            padding: 5px 10px;
            font-size: 12px;
        }

        .delete-btn:hover {
            background: #cc0000;
        }

        @media (max-width: 768px) {
            .form-group {
                flex-direction: column;
            }
            
            .chart-table {
                font-size: 12px;
            }
            
            .header h1 {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎵 Music Chart Top 100</h1>
            <p>Самые популярные песни недели</p>
        </div>

        <div class="add-song-form">
            <h3 style="margin-bottom: 15px;">➕ Добавить песню в чарт</h3>
            <div class="form-group">
                <input type="text" id="songTitle" placeholder="Название песни" />
                <input type="text" id="songArtist" placeholder="Исполнитель" />
                <input type="number" id="songStreams" placeholder="Количество стримов" value="1000" />
                <input type="number" id="songSales" placeholder="Количество продаж" value="100" />
                <button onclick="addSong()">Добавить песню</button>
            </div>
        </div>

        <div class="stats" id="stats">
            <!-- Статистика загрузится сюда -->
        </div>

        <div class="chart-container">
            <div class="chart-title">🏆 Топ 10 песен недели</div>
            <table class="chart-table" id="chartTable">
                <thead>
                    <tr>
                        <th>Позиция</th>
                        <th>Песня</th>
                        <th>Исполнитель</th>
                        <th>Стримы</th>
                        <th>Продажи</th>
                        <th>Очки</th>
                        <th>Действие</th>
                    </tr>
                </thead>
                <tbody id="chartBody">
                    <tr>
                        <td colspan="7" style="text-align: center;">Загрузка...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="graph-container">
            <div class="graph-title">📊 Популярность песен (Топ 5)</div>
            <div id="graphBars"></div>
        </div>
    </div>

    <script>
        // База данных песен (хранится в браузере)
        let songs = [];

        // Загрузить сохранённые песни при открытии страницы
        function loadSongs() {
            const saved = localStorage.getItem('musicChart');
            if (saved) {
                songs = JSON.parse(saved);
            } else {
                // Добавим примеры песен для красоты
                songs = [
                    { id: 1, title: "Shape of You", artist: "Ed Sheeran", streams: 1500000, sales: 50000 },
                    { id: 2, title: "Blinding Lights", artist: "The Weeknd", streams: 1200000, sales: 45000 },
                    { id: 3, title: "Levitating", artist: "Dua Lipa", streams: 900000, sales: 30000 },
                    { id: 4, title: "Save Your Tears", artist: "The Weeknd", streams: 800000, sales: 28000 },
                    { id: 5, title: "Stay", artist: "The Kid LAROI", streams: 750000, sales: 25000 }
                ];
            }
            updateDisplay();
        }

        // Сохранить в localStorage
        function saveSongs() {
            localStorage.setItem('musicChart', JSON.stringify(songs));
        }

        // Рассчитать очки для песни (стримы * 1 + продажи * 10)
        function calculatePoints(song) {
            return (song.streams * 1) + (song.sales * 10);
        }

        // Получить топ N песен
        function getTopSongs(limit = 10) {
            // Создаём копию с очками
            const withPoints = songs.map(song => ({
                ...song,
                points: calculatePoints(song)
            }));
            
            // Сортируем по очкам (по убыванию)
            withPoints.sort((a, b) => b.points - a.points);
            
            // Возвращаем топ N
            return withPoints.slice(0, limit);
        }

        // Обновить всю страницу
        function updateDisplay() {
            updateChart();
            updateStats();
            updateGraph();
            saveSongs();
        }

        // Обновить таблицу чарта
        function updateChart() {
            const topSongs = getTopSongs(10);
            const tbody = document.getElementById('chartBody');
            
            if (topSongs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">Нет песен. Добавьте первую!</td></tr>';
                return;
            }
            
            tbody.innerHTML = topSongs.map((song, index) => {
                let positionClass = '';
                if (index === 0) positionClass = 'position-1';
                else if (index === 1) positionClass = 'position-2';
                else if (index === 2) positionClass = 'position-3';
                
                return `
                    <tr>
                        <td class="${positionClass} position-number">#${index + 1}</td>
                        <td><strong>${escapeHtml(song.title)}</strong></td>
                        <td>${escapeHtml(song.artist)}</td>
                        <td>${formatNumber(song.streams)}</td>
                        <td>${formatNumber(song.sales)}</td>
                        <td class="points">${formatNumber(song.points)}</td>
                        <td><button class="delete-btn" onclick="deleteSong(${song.id})">🗑️</button></td>
                    </tr>
                `;
            }).join('');
        }

        // Обновить статистику
        function updateStats() {
            const totalSongs = songs.length;
            const totalStreams = songs.reduce((sum, song) => sum + song.streams, 0);
            const totalSales = songs.reduce((sum, song) => sum + song.sales, 0);
            const topSong = getTopSongs(1)[0];
            
            const statsHtml = `
                <div class="stat-card">
                    <h3>Всего песен</h3>
                    <div class="value">${totalSongs}</div>
                </div>
                <div class="stat-card">
                    <h3>Всего стримов</h3>
                    <div class="value">${formatNumber(totalStreams)}</div>
                </div>
                <div class="stat-card">
                    <h3>Всего продаж</h3>
                    <div class="value">${formatNumber(totalSales)}</div>
                </div>
                <div class="stat-card">
                    <h3>№1 песня</h3>
                    <div class="value" style="font-size: 18px;">${topSong ? escapeHtml(topSong.title) : '-'}</div>
                </div>
            `;
            
            document.getElementById('stats').innerHTML = statsHtml;
        }

        // Обновить график
        function updateGraph() {
            const topSongs = getTopSongs(5);
            const maxPoints = topSongs[0]?.points || 1;
            
            const graphHtml = topSongs.map(song => {
                const percent = (song.points / maxPoints) * 100;
                return `
                    <div class="bar">
                        <div class="bar-label">
                            <span>${escapeHtml(song.title)}</span>
                            <span>${formatNumber(song.points)} очков</span>
                        </div>
                        <div class="bar-fill" style="width: ${percent}%;">
                            ${percent > 20 ? '★' : ''}
                        </div>
                    </div>
                `;
            }).join('');
            
            document.getElementById('graphBars').innerHTML = graphHtml || '<p>Нет данных</p>';
        }

        // Добавить новую песню
        function addSong() {
            const title = document.getElementById('songTitle').value.trim();
            const artist = document.getElementById('songArtist').value.trim();
            let streams = parseInt(document.getElementById('songStreams').value);
            let sales = parseInt(document.getElementById('songSales').value);
            
            if (!title || !artist) {
                alert('Пожалуйста, введите название песни и исполнителя!');
                return;
            }
            
            if (isNaN(streams)) streams = 0;
            if (isNaN(sales)) sales = 0;
            
            const newId = Date.now();
            const newSong = {
                id: newId,
                title: title,
                artist: artist,
                streams: streams,
                sales: sales
            };
            
            songs.push(newSong);
            updateDisplay();
            
            // Очистить поля
            document.getElementById('songTitle').value = '';
            document.getElementById('songArtist').value = '';
            document.getElementById('songStreams').value = '1000';
            document.getElementById('songSales').value = '100';
            
            alert('✅ Песня добавлена в чарт!');
        }

        // Удалить песню
        function deleteSong(id) {
            if (confirm('Удалить песню из чарта?')) {
                songs = songs.filter(song => song.id !== id);
                updateDisplay();
                alert('🗑️ Песня удалена');
            }
        }

        // Вспомогательные функции
        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // Загрузить при старте
        loadSongs();
    </script>
</body>
</html>
